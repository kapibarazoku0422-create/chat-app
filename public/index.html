<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>カピバラ掲示板</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#efefef;--page:#fff;--border:#aaa;--border-light:#ddd;
  --header-bg:#00f;--header-text:#fff;
  --name:#00c;--sage:#789922;--admin:#f00;
  --odd:#fffde7;--even:#fff;
  --link:#00c;--visited:#800080;
  --btn-bg:#d4d0c8;--btn-border:#888;
  --input-bg:#fff;
  --font:Meiryo,'ヒラギノ角ゴ Pro W3','MS PGothic',sans-serif;
  --mono:'MS Gothic','Courier New',monospace;
}
html,body{height:100%;font-family:var(--font);font-size:13px;background:var(--bg);color:#000}

/* ═══════════════════════════════
   ログイン画面
═══════════════════════════════ */
#auth-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
}
.auth-box{
  background:var(--page);border:2px solid var(--border);
  padding:0;width:100%;max-width:420px;
}
.auth-box-header{
  background:var(--header-bg);color:var(--header-text);
  padding:6px 10px;font-size:14px;font-weight:bold;
}
.auth-box-body{padding:20px;}
.auth-tabs{display:flex;margin-bottom:16px;border-bottom:2px solid var(--border);}
.auth-tab{
  padding:6px 18px;cursor:pointer;background:var(--btn-bg);
  border:1px solid var(--border);border-bottom:none;font-size:13px;
  margin-right:2px;margin-bottom:-2px;
}
.auth-tab.active{background:#fff;border-bottom:2px solid #fff;font-weight:bold;}
.auth-panel{display:none;}
.auth-panel.active{display:block;}
.auth-row{display:flex;align-items:center;margin-bottom:10px;gap:8px;}
.auth-row label{width:110px;text-align:right;flex-shrink:0;font-size:13px;}
.auth-row input{
  flex:1;padding:4px 6px;border:1px solid var(--border);
  background:var(--input-bg);font-size:13px;font-family:var(--font);
}
.auth-row input:focus{outline:1px solid var(--header-bg);}
.auth-btns{display:flex;justify-content:center;margin-top:14px;}
.btn{
  padding:4px 20px;border:2px outset var(--btn-border);
  background:var(--btn-bg);cursor:pointer;font-size:13px;
  font-family:var(--font);
}
.btn:active{border-style:inset;}
.btn:hover{background:#c4c0b8;}
.auth-err{color:red;font-size:12px;margin-top:8px;text-align:center;min-height:16px;}

/* ═══════════════════════════════
   チャット画面
═══════════════════════════════ */
#chat-screen{display:none;flex-direction:column;min-height:100vh;}

/* ─ サイトヘッダー ─ */
#site-header{
  background:var(--header-bg);color:var(--header-text);
  padding:4px 10px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
#site-header .site-title{font-size:16px;font-weight:bold;letter-spacing:1px;}
#site-header .user-info{font-size:12px;display:flex;align-items:center;gap:10px;}
#site-header .user-info a{color:#ff9;cursor:pointer;text-decoration:underline;}

/* ─ レイアウト ─ */
#body-wrap{display:flex;flex:1;align-items:flex-start;padding:8px;gap:8px;}

/* ─ 板一覧（左サイドバー） ─ */
#board-list{
  width:150px;flex-shrink:0;background:var(--page);
  border:1px solid var(--border);
}
#board-list .bl-header{
  background:#00c;color:#fff;padding:3px 6px;
  font-size:12px;font-weight:bold;
}
#board-list ul{list-style:none;padding:4px 0;}
#board-list li a{
  display:block;padding:3px 10px;color:var(--link);
  text-decoration:none;font-size:12px;cursor:pointer;
}
#board-list li a:hover{background:#e8e8ff;text-decoration:underline;}
#board-list li a.active{font-weight:bold;color:#f00;}

/* ─ メインエリア ─ */
#main-area{flex:1;min-width:0;}

/* スレタイトルバー */
#thread-title-bar{
  background:var(--header-bg);color:var(--header-text);
  padding:4px 10px;font-size:13px;font-weight:bold;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:4px;
}
#thread-title-bar .member-info{font-size:11px;font-weight:normal;opacity:.9;}

/* 書き込みフォーム */
#post-form{
  background:var(--page);border:1px solid var(--border);
  padding:10px;margin-bottom:6px;
}
#post-form .form-title{
  font-size:12px;font-weight:bold;color:#00c;
  border-bottom:1px solid var(--border-light);margin-bottom:8px;padding-bottom:4px;
}
.form-row{display:flex;align-items:flex-start;margin-bottom:6px;gap:6px;}
.form-row label{width:70px;text-align:right;padding-top:3px;font-size:12px;flex-shrink:0;}
.form-row input[type=text]{
  flex:1;max-width:280px;padding:3px 5px;border:1px solid var(--border);
  background:var(--input-bg);font-size:13px;font-family:var(--font);
}
.form-row input[type=text]:focus{outline:1px solid #00c;}
.form-row textarea{
  flex:1;max-width:500px;height:80px;resize:vertical;
  padding:4px 6px;border:1px solid var(--border);
  background:var(--input-bg);font-size:13px;font-family:var(--font);
  line-height:1.5;
}
.form-row textarea:focus{outline:1px solid #00c;}
.form-btns{display:flex;gap:8px;margin-left:76px;}
.sage-note{font-size:11px;color:#888;margin-left:4px;}

/* タイピング */
#typing-bar{
  font-size:11px;color:#888;padding:2px 4px;min-height:18px;
  font-style:italic;
}

/* ─ レスリスト ─ */
#res-list{background:var(--page);border:1px solid var(--border);}

/* レス1件 */
.res{
  padding:6px 10px;border-bottom:1px solid var(--border-light);
}
.res:nth-child(odd){background:var(--odd);}
.res:nth-child(even){background:var(--even);}
.res:last-child{border-bottom:none;}

/* レスヘッダー */
.res-head{display:flex;align-items:baseline;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.res-num{color:#f00;font-weight:bold;font-size:12px;}
.res-name{color:var(--name);font-weight:bold;font-size:12px;}
.res-name.admin-name{color:var(--admin);}
.res-trip{color:var(--sage);font-size:11px;}
.res-date{color:#888;font-size:11px;}
.res-id{color:#888;font-size:11px;}
/* 管理者削除ボタン */
.res-del{
  margin-left:auto;background:none;border:none;
  color:#aaa;font-size:11px;cursor:pointer;padding:0 2px;
}
.res-del:hover{color:red;}

/* レス本文 */
.res-body{
  font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-all;
  padding-left:4px;
}
/* システムメッセージ */
.res.system-res .res-body{color:#888;font-size:11px;font-style:italic;}
.res.system-res .res-head{display:none;}

/* 管理者バッジ */
.admin-badge{
  font-size:10px;background:#f00;color:#fff;
  padding:1px 4px;border-radius:2px;font-weight:bold;
}

/* ─ 管理ダッシュボード ─ */
#admin-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.5);align-items:center;justify-content:center;padding:16px;
}
#admin-overlay.open{display:flex;}
.admin-panel{
  background:var(--page);border:2px solid var(--border);
  width:100%;max-width:700px;max-height:90vh;display:flex;flex-direction:column;
}
.admin-panel-header{
  background:var(--header-bg);color:var(--header-text);
  padding:5px 10px;display:flex;align-items:center;justify-content:space-between;
  font-size:13px;font-weight:bold;flex-shrink:0;
}
.admin-panel-body{flex:1;overflow-y:auto;padding:14px;}
.adm-section{margin-bottom:18px;}
.adm-section-title{
  font-size:12px;font-weight:bold;color:#00c;
  border-bottom:1px solid var(--border-light);margin-bottom:8px;padding-bottom:3px;
}
.adm-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.adm-stat{
  background:#e8e8ff;border:1px solid #aaf;
  padding:6px 14px;font-size:12px;text-align:center;
}
.adm-stat .v{font-size:20px;font-weight:bold;color:#00c;display:block;}
.adm-stat .l{color:#888;}
.adm-new-room{display:flex;gap:6px;margin-bottom:8px;}
.adm-new-room input{
  flex:1;padding:3px 6px;border:1px solid var(--border);
  font-size:13px;font-family:var(--font);
}
.adm-room-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 8px;border:1px solid var(--border-light);margin-bottom:4px;
  background:#fafafa;font-size:12px;
}
.adm-user-table{width:100%;border-collapse:collapse;font-size:12px;}
.adm-user-table th{
  background:#e0e0e0;border:1px solid var(--border);
  padding:4px 8px;text-align:left;
}
.adm-user-table td{border:1px solid var(--border-light);padding:4px 8px;}
.adm-user-table tr:nth-child(even) td{background:#f8f8f8;}
.btn-danger{background:#fdd;border-color:#f88;color:#c00;}
.btn-danger:hover{background:#fcc;}
.btn-warn{background:#ffe8b0;border-color:#d4a;color:#a60;}
.btn-warn:hover{background:#ffd880;}
.adm-log{max-height:160px;overflow-y:auto;border:1px solid var(--border-light);background:#fafafa;}
.adm-log-row{
  display:flex;gap:6px;align-items:flex-start;padding:3px 6px;
  border-bottom:1px solid var(--border-light);font-size:11px;
}
.adm-log-row:last-child{border-bottom:none;}
.adm-log-meta{color:#888;white-space:nowrap;flex-shrink:0;}
.adm-log-text{flex:1;word-break:break-all;}
.adm-log-del{background:none;border:none;color:#f00;cursor:pointer;font-size:11px;flex-shrink:0;}

/* キック画面 */
#kicked-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:#efefef;align-items:center;justify-content:center;
}
#kicked-overlay.open{display:flex;}
.kicked-box{
  background:#fff;border:2px solid #f00;padding:30px;
  text-align:center;max-width:300px;
}
.kicked-box h2{color:#f00;margin-bottom:8px;font-size:16px;}
.kicked-box p{font-size:13px;color:#555;}
</style>
</head>
<body>

<!-- ══════════════════ ログイン画面 ══════════════════ -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-box-header">🐾 カピバラ掲示板 — ログイン / 新規登録</div>
    <div class="auth-box-body">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">ログイン</div>
        <div class="auth-tab" id="tab-reg" onclick="switchTab('reg')">新規登録</div>
      </div>

      <!-- ログイン -->
      <div class="auth-panel active" id="panel-login">
        <div class="auth-row"><label>名前：</label><input type="text" id="login-name" placeholder="ユーザー名" maxlength="20"/></div>
        <div class="auth-row"><label>パスワード：</label><input type="password" id="login-pass" placeholder="パスワード"/></div>
        <div class="auth-btns"><button class="btn" id="login-btn">ログイン</button></div>
        <div class="auth-err" id="login-err"></div>
      </div>

      <!-- 新規登録 -->
      <div class="auth-panel" id="panel-reg">
        <div class="auth-row"><label>名前：</label><input type="text" id="reg-name" placeholder="ユーザー名（20文字以内）" maxlength="20"/></div>
        <div class="auth-row"><label>パスワード：</label><input type="password" id="reg-pass" placeholder="4文字以上"/></div>
        <div class="auth-row"><label>確認：</label><input type="password" id="reg-pass2" placeholder="もう一度入力"/></div>
        <div class="auth-btns"><button class="btn" id="reg-btn">登録してログイン</button></div>
        <div class="auth-err" id="reg-err"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════ チャット画面 ══════════════════ -->
<div id="chat-screen">
  <!-- サイトヘッダー -->
  <div id="site-header">
    <span class="site-title">🐾 カピバラ掲示板</span>
    <div class="user-info">
      <span id="header-username"></span>
      <span id="admin-badge-header" class="admin-badge" style="display:none">管理者</span>
      <a id="admin-link" style="display:none" onclick="openAdmin()">【管理画面】</a>
      <a onclick="logout()">ログアウト</a>
    </div>
  </div>

  <div id="body-wrap">
    <!-- 左：板一覧 -->
    <div id="board-list">
      <div class="bl-header">■ 板一覧</div>
      <ul id="room-ul"></ul>
    </div>

    <!-- 右：スレ -->
    <div id="main-area">
      <div id="thread-title-bar">
        <span id="thread-title">板を選択してください</span>
        <span class="member-info" id="member-info"></span>
      </div>

      <!-- 書き込みフォーム -->
      <div id="post-form">
        <div class="form-title">■ 書き込み</div>
        <div class="form-row">
          <label>本文：</label>
          <textarea id="msg-input" placeholder="ここに書き込む（Ctrl+Enterで投稿）"></textarea>
        </div>
        <div class="form-btns">
          <button class="btn" id="send-btn">書き込む</button>
          <span class="sage-note">※ Ctrl+Enterでも投稿できます</span>
        </div>
      </div>

      <div id="typing-bar"></div>

      <!-- レス一覧 -->
      <div id="res-list"></div>
    </div>
  </div>
</div>

<!-- 管理者ダッシュボード -->
<div id="admin-overlay">
  <div class="admin-panel">
    <div class="admin-panel-header">
      ■ 管理者ダッシュボード
      <button class="btn" id="close-admin">閉じる</button>
    </div>
    <div class="admin-panel-body">
      <!-- Stats -->
      <div class="adm-section">
        <div class="adm-section-title">■ サーバー状況</div>
        <div class="adm-stats">
          <div class="adm-stat"><span class="v" id="st-users">0</span><span class="l">接続中</span></div>
          <div class="adm-stat"><span class="v" id="st-rooms">0</span><span class="l">板数</span></div>
          <div class="adm-stat"><span class="v" id="st-banned">0</span><span class="l">BAN数</span></div>
        </div>
      </div>
      <!-- Room -->
      <div class="adm-section">
        <div class="adm-section-title">■ 板管理</div>
        <div class="adm-new-room">
          <input type="text" id="new-room-name" placeholder="新しい板名…" maxlength="30"/>
          <button class="btn" onclick="createRoom()">作成</button>
        </div>
        <div id="adm-room-list"></div>
      </div>
      <!-- Users -->
      <div class="adm-section">
        <div class="adm-section-title">■ ユーザー管理</div>
        <table class="adm-user-table">
          <thead><tr><th>ユーザー</th><th>板</th><th>IP</th><th>操作</th></tr></thead>
          <tbody id="adm-user-tbody"></tbody>
        </table>
      </div>
      <!-- Log -->
      <div class="adm-section">
        <div class="adm-section-title">■ 発言ログ（最新50件）</div>
        <div class="adm-log" id="adm-log"></div>
      </div>
    </div>
  </div>
</div>

<!-- キック通知 -->
<div id="kicked-overlay">
  <div class="kicked-box">
    <h2>⛔ 接続を切断されました</h2>
    <p id="kicked-reason"></p>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  状態
// ═══════════════════════════════════════════
let socket = null;
let myToken = '', myName = '', amAdmin = false;
let myRoom = '';
let resCount = 0;
let typingTimeout;
let typingUsers = new Map();
let allRooms = [];

// DOM
const authScreen   = document.getElementById('auth-screen');
const chatScreen   = document.getElementById('chat-screen');
const resList      = document.getElementById('res-list');
const msgInput     = document.getElementById('msg-input');
const typingBar    = document.getElementById('typing-bar');
const adminOverlay = document.getElementById('admin-overlay');
const roomUl       = document.getElementById('room-ul');

// ═══════════════════════════════════════════
//  ユーティリティ
// ═══════════════════════════════════════════
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function fmtDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}(${['日','月','火','水','木','金','土'][d.getDay()]}) ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}
function shortId(id) { return id.slice(-8); }

// ═══════════════════════════════════════════
//  認証タブ切り替え
// ═══════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
}

// ═══════════════════════════════════════════
//  ログイン / 登録
// ═══════════════════════════════════════════
async function apiPost(url, body) {
  const r = await fetch(url, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  return r.json();
}

document.getElementById('login-btn').onclick = async () => {
  const username = document.getElementById('login-name').value.trim();
  const password = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  err.textContent = '';
  if (!username || !password) { err.textContent = '入力してください'; return; }
  const res = await apiPost('/api/login', { username, password });
  if (res.error) { err.textContent = res.error; return; }
  startChat(res.token, res.username, res.isAdmin);
};

document.getElementById('reg-btn').onclick = async () => {
  const username = document.getElementById('reg-name').value.trim();
  const password = document.getElementById('reg-pass').value;
  const password2= document.getElementById('reg-pass2').value;
  const err = document.getElementById('reg-err');
  err.textContent = '';
  if (!username || !password) { err.textContent = '入力してください'; return; }
  if (password !== password2) { err.textContent = 'パスワードが一致しません'; return; }
  const res = await apiPost('/api/register', { username, password });
  if (res.error) { err.textContent = res.error; return; }
  startChat(res.token, res.username, res.isAdmin);
};

// Enterキー対応
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-btn').click(); });
document.getElementById('reg-pass2').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('reg-btn').click(); });

// ═══════════════════════════════════════════
//  チャット開始
// ═══════════════════════════════════════════
function startChat(token, username, isAdmin) {
  myToken = token; myName = username; amAdmin = isAdmin;
  authScreen.style.display = 'none';
  chatScreen.style.display = 'flex';
  document.getElementById('header-username').textContent = username + ' さん';
  if (isAdmin) {
    document.getElementById('admin-badge-header').style.display = '';
    document.getElementById('admin-link').style.display = '';
  }
  initSocket();
  // デフォルトでGeneralに入室
  joinRoom('General');
}

function logout() {
  if (socket) { socket.disconnect(); socket = null; }
  myToken = ''; myName = ''; amAdmin = false; myRoom = '';
  chatScreen.style.display = 'none';
  authScreen.style.display = 'flex';
  document.getElementById('login-name').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-err').textContent = '';
}

// ═══════════════════════════════════════════
//  Socket.IO
// ═══════════════════════════════════════════
function initSocket() {
  socket = io({ transports: ['polling', 'websocket'] });

  socket.on('joined', ({ isAdmin, username }) => {
    amAdmin = isAdmin;
    if (amAdmin) socket.emit('admin:getStats');
  });

  socket.on('message', appendRes);

  socket.on('system', ({ text, timestamp }) => {
    appendSystemRes(text, timestamp);
  });

  socket.on('members', (members) => {
    document.getElementById('member-info').textContent =
      `${members.length}人いる`;
    updateRoomList();
  });

  socket.on('typing', ({ name, isTyping }) => {
    if (name === myName) return;
    isTyping ? typingUsers.set(name, name) : typingUsers.delete(name);
    updateTyping();
  });

  socket.on('deleteMsg', ({ msgId }) => {
    const el = document.querySelector(`.res[data-id="${msgId}"]`);
    if (el) {
      el.querySelector('.res-body').textContent = '（この発言は削除されました）';
      el.querySelector('.res-body').style.color = '#aaa';
      const delBtn = el.querySelector('.res-del');
      if (delBtn) delBtn.remove();
    }
  });

  socket.on('admin:stats', renderAdminStats);

  socket.on('roomCreated', ({ room }) => {
    updateRoomList();
  });

  socket.on('roomDeleted', ({ room }) => {
    appendSystemRes(`板「${room}」は削除されました`);
  });

  socket.on('kicked', ({ reason }) => {
    document.getElementById('kicked-reason').textContent = reason;
    document.getElementById('kicked-overlay').classList.add('open');
  });

  socket.on('authError', (msg) => {
    alert(msg);
    logout();
  });
}

function joinRoom(roomName) {
  if (!socket) return;
  myRoom = roomName;
  resCount = 0;
  resList.innerHTML = '';
  typingUsers.clear();
  updateTyping();

  document.getElementById('thread-title').textContent = `■ ${roomName}`;
  document.getElementById('member-info').textContent = '';

  // 板一覧の active 更新
  document.querySelectorAll('#room-ul li a').forEach(a => {
    a.classList.toggle('active', a.dataset.room === roomName);
  });

  socket.emit('join', { token: myToken, room: roomName });
}

// ═══════════════════════════════════════════
//  板一覧
// ═══════════════════════════════════════════
const DEFAULT_ROOMS = ['General','雑談','質問','ゲーム','アニメ'];
function updateRoomList(rooms) {
  if (rooms) allRooms = rooms;
  const list = allRooms.length ? allRooms : DEFAULT_ROOMS.map(n => ({ name: n }));
  roomUl.innerHTML = list.map(r =>
    `<li><a data-room="${esc(r.name)}" class="${r.name===myRoom?'active':''}"
      onclick="joinRoom('${esc(r.name)}')">${esc(r.name)}</a></li>`
  ).join('');
}
updateRoomList();

// ═══════════════════════════════════════════
//  レス表示
// ═══════════════════════════════════════════
function appendRes({ id, name, color, text, timestamp, isAdmin: senderAdmin }) {
  resCount++;
  const div = document.createElement('div');
  div.className = 'res';
  div.dataset.id = id;

  const delBtn = amAdmin
    ? `<button class="res-del" onclick="deleteMsgAdmin('${id}')" title="削除">［削除］</button>`
    : '';

  div.innerHTML = `
    <div class="res-head">
      <span class="res-num">${resCount}</span>
      <span class="res-name${senderAdmin?' admin-name':''}">${esc(name)}</span>
      ${senderAdmin ? '<span class="admin-badge">管理者</span>' : ''}
      <span class="res-date">${fmtDate(timestamp)}</span>
      <span class="res-id">ID:${shortId(id)}</span>
      ${delBtn}
    </div>
    <div class="res-body">${esc(text)}</div>`;
  resList.appendChild(div);
  resList.scrollTop = resList.scrollHeight;
}

function appendSystemRes(text, timestamp) {
  const div = document.createElement('div');
  div.className = 'res system-res';
  div.innerHTML = `<div class="res-body">--- ${esc(text)} ---</div>`;
  resList.appendChild(div);
  resList.scrollTop = resList.scrollHeight;
}

function updateTyping() {
  const names = [...typingUsers.values()];
  typingBar.textContent = names.length
    ? `${names.join('、')} が入力中…`
    : '';
}

// ═══════════════════════════════════════════
//  送信
// ═══════════════════════════════════════════
document.getElementById('send-btn').onclick = sendMsg;
msgInput.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); sendMsg(); }
});
msgInput.addEventListener('input', () => {
  if (!socket) return;
  socket.emit('typing', true);
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => socket.emit('typing', false), 1500);
});

function sendMsg() {
  if (!socket) return;
  const text = msgInput.value.trim();
  if (!text) return;
  socket.emit('message', text);
  msgInput.value = '';
  socket.emit('typing', false);
  clearTimeout(typingTimeout);
}

// ═══════════════════════════════════════════
//  管理者機能
// ═══════════════════════════════════════════
function openAdmin() {
  adminOverlay.classList.add('open');
  if (socket) socket.emit('admin:getStats');
}
document.getElementById('close-admin').onclick = () => adminOverlay.classList.remove('open');
adminOverlay.addEventListener('click', e => { if(e.target===adminOverlay) adminOverlay.classList.remove('open'); });

function deleteMsgAdmin(msgId) {
  if (!confirm('このレスを削除しますか？')) return;
  socket.emit('admin:deleteMsg', { msgId });
}
function kickUser(sid) {
  if (!confirm('キックしますか？')) return;
  socket.emit('admin:kick', { targetSocketId: sid });
}
function banUser(sid, name) {
  if (!confirm(`${name} をBANしますか？`)) return;
  socket.emit('admin:ban', { targetSocketId: sid });
}
function createRoom() {
  const name = document.getElementById('new-room-name').value.trim();
  if (!name) return;
  socket.emit('admin:createRoom', { roomName: name });
  document.getElementById('new-room-name').value = '';
}
function deleteRoom(name) {
  if (!confirm(`板「${name}」を削除しますか？全員が切断されます。`)) return;
  socket.emit('admin:deleteRoom', { roomName: name });
}

function renderAdminStats({ totalUsers, totalRooms, bannedCount, rooms, recentLogs }) {
  updateRoomList(rooms);
  document.getElementById('st-users').textContent = totalUsers;
  document.getElementById('st-rooms').textContent = totalRooms;
  document.getElementById('st-banned').textContent = bannedCount;

  // 板一覧
  document.getElementById('adm-room-list').innerHTML = rooms.map(r => `
    <div class="adm-room-row">
      <span>■ ${esc(r.name)}（${r.count}人）</span>
      <button class="btn btn-danger" onclick="deleteRoom('${esc(r.name)}')">削除</button>
    </div>`).join('');

  // ユーザー
  const allUsers = rooms.flatMap(r => r.members.map(m => ({ ...m, roomName: r.name })));
  document.getElementById('adm-user-tbody').innerHTML = allUsers.map(u => `
    <tr>
      <td>${esc(u.username)}${u.isAdmin?' <span class="admin-badge">管理者</span>':''}</td>
      <td>${esc(u.roomName)}</td>
      <td style="font-size:10px">${esc(u.ip||'')}</td>
      <td>${u.isAdmin ? '－' : `
        <button class="btn btn-warn" onclick="kickUser('${u.socketId}')">キック</button>
        <button class="btn btn-danger" onclick="banUser('${u.socketId}','${esc(u.username)}')">BAN</button>
      `}</td>
    </tr>`).join('');

  // ログ
  document.getElementById('adm-log').innerHTML = [...recentLogs].reverse().map(l => `
    <div class="adm-log-row">
      <span class="adm-log-meta">${fmtDate(l.timestamp)} [${esc(l.room)}] ${esc(l.name)}</span>
      <span class="adm-log-text">${esc(l.text)}</span>
      <button class="adm-log-del" onclick="deleteMsgAdmin('${l.id}')">削除</button>
    </div>`).join('');
}
</script>
</body>
</html>
